<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder | Editor</title>
  <link rel="icon" type="image/png" href="/assets/head.png">
  <meta name="description" content="Generate pixel-perfect, professional resumes instantly from JSON data.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #10141d;
      --accent-primary: #4361ee;
      --accent-hover: #3046c9;
      --accent-glow: rgba(67, 97, 238, 0.4);
      --text-main: #f8f9fa;
      --text-muted: #a0aab4;
      --border-color: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(16, 20, 29, 0.65);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top, rgba(67, 97, 238, 0.2), transparent 28%),
                  linear-gradient(180deg, #090b0f 0%, #0e1320 100%);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      padding: 20px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(11, 14, 19, 0.92);
      backdrop-filter: blur(18px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        gap: 16px;
      }

      .nav-actions {
        flex-direction: column;
        width: 100%;
      }

      .nav-actions .form-group-inline {
        width: 100%;
        justify-content: space-between;
      }

      input[type="text"] {
        flex: 1;
      }

      button {
        width: 100%;
        justify-content: center;
      }
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, #a0aab4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
    }

    .form-group-inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group-inline label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .editor-mode {
      align-items: center;
    }

    .mode-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
    }

    .mode-btn.active {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: #fff;
    }

    .hidden {
      display: none !important;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
    }

    .form-editor {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 360px;
      overflow-y: auto;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(8, 12, 20, 0.95);
    }

    .field-item,
    .array-item {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 18px;
      background: rgba(255, 255, 255, 0.04);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-header,
    .array-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: nowrap; /* keep heading and actions on one line */
    }

    .field-key,
    .field-input,
    .array-item-input {
      background-color: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 12px;
      color: var(--text-main);
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      width: 100%;
      min-width: 180px;
    }

    .field-key {
      flex: 1.2;
      max-width: 320px;
      min-width: 180px;
    }

    .field-value {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .field-actions button {
      white-space: nowrap;
    }

    .array-editor {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .array-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .object-editor {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-left: 8px;
      border-left: 2px solid rgba(255, 255, 255, 0.08);
    }

    .empty-state {
      color: var(--text-muted);
      padding: 14px 16px;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: 14px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
      font-size: 13px;
    }

    .field-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .editor-box {
      min-height: 540px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 0;
    }

    #fields-editor-box {
      display: flex;
      flex-direction: column;
      min-height: 540px;
      flex: 1;
      min-height: 0;
    }

    .form-editor {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 360px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(8, 12, 20, 0.95);
      /* Ensure the form area can scroll inside the viewport regardless of parent sizing */
      max-height: calc(100vh - 240px);
    }

    .field-heading {
      color: #f8fafc;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: capitalize;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .field-header .field-heading {
      flex: 1 1 auto;
      min-width: 0; /* allow ellipsis */
      margin-bottom: 0; /* keep on same line */
    }

    .field-header .field-actions {
      flex: 0 0 auto;
      margin-left: 12px;
    }

    .field-meta {
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .editor-header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.03);
      gap: 12px;
    }

    .editor-title {
      font-size: 14px;
      font-weight: 700;
      color: #eef2ff;
    }

    textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      padding: 26px;
      color: #e2e8f0;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.8;
      resize: none;
      outline: none;
      min-height: 460px;
    }

    .field-key {
      flex: 1.2;
      max-width: 280px;
    }

    .field-value,
    .array-items {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .field-actions button {
      white-space: nowrap;
    }

    .object-editor,
    .array-editor {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-left: 8px;
      border-left: 2px solid rgba(255, 255, 255, 0.08);
    }

    .empty-state {
      color: var(--text-muted);
      padding: 12px 14px;
      border: 1px dashed rgba(255, 255, 255, 0.16);
      border-radius: 10px;
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .field-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    input[type="text"] {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-main);
      font-size: 13px;
      transition: all 0.3s ease;
      outline: none;
      width: 200px;
    }

    input[type="text"]:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    button {
      background-color: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
    
    /* Red dustbin remove button: icon-only with red border */
    .btn-remove {
      background: transparent;
      border: 1px solid #e63946;
      color: #e63946;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 6px;
    }

    .btn-remove:hover {
      background: rgba(230,57,70,0.06);
      transform: translateY(-1px);
    }

    .btn-remove svg {
      width: 16px;
      height: 16px;
      fill: #e63946;
      display: block;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading .spinner {
      display: block;
    }

    .loading .btn-text {
      display: none;
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 24px 36px;
      gap: 22px;
      overflow: hidden;
    }

    .editor-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(16, 20, 29, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .editor-header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .editor-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    textarea {
      flex: 1;
      width: 100%;
      background: rgba(8, 12, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      padding: 26px;
      color: #e2e8f0;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.8;
      resize: none;
      outline: none;
      min-height: 520px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.03);
    }

    /* Notification Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #ef233c;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success {
      background: #2ec4b6;
    }

    /* ─── Preview & Download Buttons ─── */
    .btn-preview {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      opacity: 0.4;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .btn-preview.active {
      opacity: 1;
      pointer-events: auto;
      border-color: rgba(67, 97, 238, 0.4);
    }

    .btn-preview.active:hover {
      background: rgba(67, 97, 238, 0.15);
      border-color: var(--accent-primary);
    }

    .btn-download {
      background: linear-gradient(135deg, #2ec4b6, #1a9e92);
      border: none;
    }

    .btn-download:hover {
      background: linear-gradient(135deg, #28b0a3, #178a80);
    }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      padding: 24px;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      width: 100%;
      max-width: 860px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.open .modal-container {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.3px;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .modal-body {
      flex: 1;
      overflow: auto; /* Allow both horizontal and vertical scroll */
      background: var(--bg-secondary);
      padding: 16px;
    }

    .iframe-scaler-wrapper {
      position: relative;
      margin: 0 auto;
    }

    .iframe-scaler {
      width: 800px;
      height: 1131px; /* A4 ratio */
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
    }

    .iframe-scaler iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      border-radius: 6px;
      background: #fff;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .modal-download-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-primary), #6366f1);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .modal-download-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
    }

    .modal-download-btn .spinner {
      width: 16px;
      height: 16px;
    }

    /* ─── Modal responsive ─── */
    @media (max-width: 600px) {
      .modal-overlay {
        padding: 12px;
      }

      .modal-container {
        max-width: 100%;
        height: 90vh;
        border-radius: 12px;
      }

      .modal-header {
        padding: 12px 16px;
      }

      .modal-footer {
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="/" class="logo">ResumeBuilder</a>
    <div class="nav-actions">
      <div class="form-group-inline editor-mode">
        <label>Mode:</label>
        <button type="button" class="mode-btn active" id="mode-json">JSON</button>
        <button type="button" class="mode-btn" id="mode-fields">Fields</button>
      </div>
      <div class="form-group-inline">
        <label for="filename">File:</label>
        <input type="text" id="filename" placeholder="resume_name" value="john_doe_resume">
      </div>
      <button type="button" class="btn-secondary" id="load-sample">Load Sample</button>
      <button type="button" class="btn-preview" id="preview-btn">
        <span>👁 Preview</span>
      </button>
      <button type="button" class="btn-download" id="generate-btn">
        <span class="spinner"></span>
        <span class="btn-text">⬇ Download PDF</span>
      </button>
    </div>
  </nav>

  <div class="editor-container">
    <div class="editor-box" id="json-editor-box">
      <div class="editor-header">
        <span class="editor-title">JSON Editor</span>
      </div>
      <textarea id="json-data" spellcheck="false" placeholder='Paste your JSON schema here...'></textarea>
    </div>

    <div class="editor-box hidden" id="fields-editor-box">
      <div class="editor-header">
        <span class="editor-title">Structured Fields</span>
      </div>
      <div class="form-editor" id="form-editor"></div>
      <div style="padding: 0 20px 20px; color: var(--text-muted); font-size: 13px;">
        Tip: only one editor is visible at a time. Field headings cannot be deleted, but you can add and remove list items within each section.
      </div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="preview-modal">
    <div class="modal-container">
      <div class="modal-header">
        <span class="modal-title">Resume Preview</span>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <div class="iframe-scaler-wrapper" id="iframe-scaler-wrapper">
          <div class="iframe-scaler" id="iframe-scaler">
            <iframe id="preview-iframe" title="Resume Preview"></iframe>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-download-btn" id="modal-download-btn">
          <span class="spinner"></span>
          <span class="btn-text">⬇ Download Resume</span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const jsonInput = document.getElementById('json-data');
    const filenameInput = document.getElementById('filename');
    const generateBtn = document.getElementById('generate-btn');
    const loadSampleBtn = document.getElementById('load-sample');
    const previewBtn = document.getElementById('preview-btn');
    const toast = document.getElementById('toast');

    const modeJsonBtn = document.getElementById('mode-json');
    const modeFieldsBtn = document.getElementById('mode-fields');
    const jsonEditorBox = document.getElementById('json-editor-box');
    const fieldsEditorBox = document.getElementById('fields-editor-box');
    const formEditor = document.getElementById('form-editor');

    // Modal elements
    const modal = document.getElementById('preview-modal');
    const modalCloseBtn = document.getElementById('modal-close-btn');
    const modalDownloadBtn = document.getElementById('modal-download-btn');
    const previewIframe = document.getElementById('preview-iframe');
    const iframeScaler = document.getElementById('iframe-scaler');
    const iframeScalerWrapper = document.getElementById('iframe-scaler-wrapper');
    const modalBody = document.getElementById('modal-body');

    let editorMode = 'json';

    function formatData(data) {
      return JSON.stringify(data, null, 2);
    }

    function showToast(message, isSuccess = false) {
      toast.textContent = message;
      toast.className = isSuccess ? 'success show' : 'show';
      setTimeout(() => { toast.classList.remove('show'); }, 4000);
    }

    function checkJsonValid() {
      const raw = jsonInput.value.trim();
      if (!raw) { previewBtn.classList.remove('active'); return false; }
      try {
        JSON.parse(raw);
        previewBtn.classList.add('active');
        return true;
      } catch {
        previewBtn.classList.remove('active');
        return false;
      }
    }

    function parseJsonValue(value) {
      return value == null ? '' : String(value);
    }

    function toTitleCase(str) {
      return String(str)
        .replace(/[-_]/g, ' ')
        .replace(/\w\S*/g, (txt) => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase());
    }

    function getParsedData() {
      const raw = jsonInput.value.trim();
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch (err) {
        showToast('Invalid JSON. Switch back to JSON editor to fix it.');
        return null;
      }
    }

    function setEditorMode(mode) {
      if (mode === editorMode) return;
      if (mode === 'fields') {
        const parsed = getParsedData();
        if (parsed === null) return;
        if (Array.isArray(parsed) || typeof parsed !== 'object') {
          showToast('Fields mode requires a JSON object at the root.');
          return;
        }
        updateFormFromJson(parsed);
        modeFieldsBtn.classList.add('active');
        modeJsonBtn.classList.remove('active');
        jsonEditorBox.classList.add('hidden');
        jsonEditorBox.style.display = 'none';
        fieldsEditorBox.classList.remove('hidden');
        fieldsEditorBox.style.display = 'flex';
      } else {
        modeJsonBtn.classList.add('active');
        modeFieldsBtn.classList.remove('active');
        jsonEditorBox.classList.remove('hidden');
        jsonEditorBox.style.display = 'flex';
        fieldsEditorBox.classList.add('hidden');
        fieldsEditorBox.style.display = 'none';
      }
      editorMode = mode;
    }

    function ensureRootEditor() {
      let root = formEditor.querySelector('.object-editor');
      if (!root) {
        root = createObjectEditor({});
        formEditor.innerHTML = '';
        formEditor.appendChild(root);
      }
      return root;
    }

    function createObjectEditor(obj) {
      const container = document.createElement('div');
      container.className = 'object-editor';

      const keys = Object.keys(obj);
      if (!keys.length) {
        const emptyState = document.createElement('div');
        emptyState.className = 'empty-state';
        emptyState.textContent = 'No fields to show. Load sample data or switch back to the JSON editor to add fields.';
        container.appendChild(emptyState);
        return container;
      }

      keys.forEach((key) => {
        const value = obj[key];
        container.appendChild(createFieldItem(key, value));
      });

      return container;
    }

    function createFieldItem(key, value) {
      const item = document.createElement('div');
      item.className = 'field-item';

      const header = document.createElement('div');
      header.className = 'field-header';

      const keyLabel = document.createElement('div');
      keyLabel.className = 'field-heading';
      keyLabel.textContent = key ? toTitleCase(key) : 'Untitled';

      const actions = document.createElement('div');
      actions.className = 'field-actions';

      const isArray = Array.isArray(value);
      if (isArray) {
        const addSubButton = document.createElement('button');
        addSubButton.type = 'button';
        addSubButton.className = 'btn-secondary btn-small';
        addSubButton.innerHTML = '<span style="font-weight:700; margin-right:8px;">+</span> Add item';
        addSubButton.addEventListener('click', () => {
          const target = item.querySelector('.field-value > .array-editor');
          if (!target) return;
          const list = target.querySelector('.array-items');
          list.appendChild(createArrayItem(''));
          updateJsonFromForm();
        });
        actions.appendChild(addSubButton);
      }

      header.appendChild(keyLabel);
      header.appendChild(actions);

      const valueWrapper = document.createElement('div');
      valueWrapper.className = 'field-value';

      if (Array.isArray(value)) {
        valueWrapper.appendChild(createArrayEditor(value));
      } else if (value && typeof value === 'object') {
        valueWrapper.appendChild(createObjectEditor(value));
      } else {
        const inputValue = document.createElement('input');
        inputValue.className = 'field-input';
        inputValue.type = 'text';
        inputValue.value = parseJsonValue(value);
        inputValue.placeholder = 'Field value';
        inputValue.addEventListener('input', updateJsonFromForm);
        valueWrapper.appendChild(inputValue);
      }

      item.appendChild(header);
      item.appendChild(valueWrapper);
      return item;
    }

    function createArrayEditor(arr) {
      const arrayWrapper = document.createElement('div');
      arrayWrapper.className = 'array-editor';

      const list = document.createElement('div');
      list.className = 'array-items';

      if (!arr.length) {
        list.appendChild(createArrayItem(''));
      } else {
        arr.forEach((value) => {
          list.appendChild(createArrayItem(value));
        });
      }

      const addButton = document.createElement('button');
      addButton.type = 'button';
      addButton.className = 'btn-secondary btn-small';
      addButton.innerHTML = '<span style="font-weight:700; margin-right:8px;">+</span> Add item';
      addButton.addEventListener('click', () => {
        list.appendChild(createArrayItem(''));
        updateJsonFromForm();
      });

      arrayWrapper.appendChild(list);
      arrayWrapper.appendChild(addButton);
      return arrayWrapper;
    }

    function createArrayItem(value) {
      const item = document.createElement('div');
      item.className = 'array-item';

      const header = document.createElement('div');
      header.className = 'array-item-header';

      const label = document.createElement('span');
      label.className = 'field-label';
      label.textContent = 'Item';

      const removeButton = document.createElement('button');
      removeButton.type = 'button';
      removeButton.className = 'btn-remove';
      removeButton.title = 'Remove item';
      // Dustbin SVG icon
      removeButton.innerHTML = '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M9 3v1H4v2h16V4h-5V3H9zm1 6v8h2V9h-2zm4 0v8h2V9h-2zM7 9v8h2V9H7z"/></svg>';
      removeButton.addEventListener('click', () => {
        item.remove();
        updateJsonFromForm();
      });

      header.appendChild(label);
      header.appendChild(removeButton);
      item.appendChild(header);

      if (Array.isArray(value)) {
        item.appendChild(createArrayEditor(value));
      } else if (value && typeof value === 'object') {
        item.appendChild(createObjectEditor(value));
      } else {
        const input = document.createElement('input');
        input.className = 'array-item-input';
        input.type = 'text';
        input.value = parseJsonValue(value);
        input.placeholder = 'Item value';
        input.addEventListener('input', updateJsonFromForm);
        item.appendChild(input);
      }

      return item;
    }

    function parseFieldValue(wrapper) {
      const objectEditor = wrapper.querySelector(':scope > .object-editor');
      if (objectEditor) {
        return serializeObjectEditor(objectEditor);
      }
      const arrayEditor = wrapper.querySelector(':scope > .array-editor');
      if (arrayEditor) {
        return serializeArrayEditor(arrayEditor);
      }
      const input = wrapper.querySelector('input');
      return input ? input.value : '';
    }

    function serializeObjectEditor(container) {
      const result = {};
      const fields = Array.from(container.querySelectorAll(':scope > .field-item'));
      fields.forEach((field) => {
        const keyLabel = field.querySelector('.field-heading');
        const key = keyLabel ? keyLabel.textContent.trim().toLowerCase().replace(/\s+/g, '_') : '';
        if (!key) return;
        const valueWrapper = field.querySelector('.field-value');
        result[key] = parseFieldValue(valueWrapper);
      });
      return result;
    }

    function serializeArrayEditor(container) {
      const result = [];
      const items = Array.from(container.querySelectorAll(':scope > .array-items > .array-item'));
      items.forEach((item) => {
        const objectEditor = item.querySelector(':scope > .object-editor');
        if (objectEditor) {
          result.push(serializeObjectEditor(objectEditor));
          return;
        }
        const arrayEditor = item.querySelector(':scope > .array-editor');
        if (arrayEditor) {
          result.push(serializeArrayEditor(arrayEditor));
          return;
        }
        const input = item.querySelector('input');
        result.push(input ? input.value : '');
      });
      return result;
    }

    function updateJsonFromForm() {
      const root = formEditor.querySelector('.object-editor');
      if (!root) return;
      const data = serializeObjectEditor(root);
      jsonInput.value = formatData(data);
      checkJsonValid();
    }

    function updateFormFromJson(parsed) {
      formEditor.innerHTML = '';
      const editor = createObjectEditor(parsed && typeof parsed === 'object' && !Array.isArray(parsed) ? parsed : {});
      formEditor.appendChild(editor);
    }

      if (window.innerWidth <= 768) {

      const finalScale = Math.min(scale, 1.2);
      iframeScaler.style.transform = `scale(${finalScale})`;
      iframeScalerWrapper.style.width = `${800 * finalScale}px`;
      iframeScalerWrapper.style.height = `${1131 * finalScale}px`;
    }

    function openModal() { modal.classList.add('open'); document.body.style.overflow = 'hidden'; }

    jsonInput.addEventListener('input', checkJsonValid);

    modeFieldsBtn.addEventListener('click', () => setEditorMode('fields'));

    function openPreview() {
      const rawJson = jsonInput.value.trim();
      let parsedData;
      try { parsedData = JSON.parse(rawJson); } catch { showToast('Invalid JSON.'); return; }

      openModal();
      fetch('/preview', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: parsedData })
      }).then(async (res) => {
        if (!res.ok) throw new Error('Preview failed');
        return res.text();
      }).then((html) => {
        const doc = previewIframe.contentDocument || previewIframe.contentWindow.document;
        doc.open();
        doc.write(html);
        doc.close();
        requestAnimationFrame(() => { requestAnimationFrame(scalePreview); });
      }).catch(() => {
        showToast('Failed to load preview.');
        closeModal();
      });
    }

    previewBtn.addEventListener('click', openPreview);

    function downloadResume(btn) {
      const rawJson = jsonInput.value.trim();
      let filename = filenameInput.value.trim() || 'resume';
      if (!filename.endsWith('.pdf')) filename += '.pdf';

      if (!rawJson) { showToast('JSON payload cannot be empty.'); return; }
      let parsedData;
      try { parsedData = JSON.parse(rawJson); } catch { showToast('Invalid JSON structure.'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      fetch('/pdf', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: parsedData, filename: filename })
      }).then(async (response) => {
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `Server returned ${response.status}`);
        }
        return response.blob();
      }).then((blob) => {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        showToast('Resume generated and downloading!', true);
      }).catch((error) => {
        console.error(error);
        showToast(`Failed: ${error.message}`);
      }).finally(() => {
        btn.classList.remove('loading');
        btn.disabled = false;
      });
    }

    generateBtn.addEventListener('click', () => downloadResume(generateBtn));
    modalDownloadBtn.addEventListener('click', () => downloadResume(modalDownloadBtn));
