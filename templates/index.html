<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Builder | Editor</title>
  <meta name="description" content="Generate pixel-perfect, professional resumes instantly from JSON data.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    :root {
      --bg-primary: #0a0c10;
      --bg-secondary: #10141d;
      --accent-primary: #4361ee;
      --accent-hover: #3046c9;
      --accent-glow: rgba(67, 97, 238, 0.4);
      --text-main: #f8f9fa;
      --text-muted: #a0aab4;
      --border-color: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(16, 20, 29, 0.65);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    nav {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      background: rgba(10, 12, 16, 0.8);
      backdrop-filter: blur(10px);
      flex-shrink: 0;
    }

    @media (max-width: 600px) {
      nav {
        flex-direction: column;
        gap: 16px;
      }

      .nav-actions {
        flex-direction: column;
        width: 100%;
      }

      .nav-actions .form-group-inline {
        width: 100%;
        justify-content: space-between;
      }

      input[type="text"] {
        flex: 1;
      }

      button {
        width: 100%;
        justify-content: center;
      }
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, #a0aab4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .form-group-inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group-inline label {
      font-size: 13px;
      color: var(--text-muted);
    }

    input[type="text"] {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-main);
      font-size: 13px;
      transition: all 0.3s ease;
      outline: none;
      width: 200px;
    }

    input[type="text"]:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    button {
      background-color: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background-color: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading .spinner {
      display: block;
    }

    .loading .btn-text {
      display: none;
    }

    .editor-container {
      display: flex;
      flex-direction: column;
      flex: 1;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      overflow: hidden;
    }

    .editor-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    .editor-header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .editor-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    textarea {
      flex: 1;
      width: 100%;
      background: transparent;
      border: none;
      padding: 24px;
      color: #e2e8f0;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
    }

    /* Notification Toast */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #ef233c;
      color: #fff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #toast.success {
      background: #2ec4b6;
    }

    /* ─── Preview & Download Buttons ─── */
    .btn-preview {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      opacity: 0.4;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .btn-preview.active {
      opacity: 1;
      pointer-events: auto;
      border-color: rgba(67, 97, 238, 0.4);
    }

    .btn-preview.active:hover {
      background: rgba(67, 97, 238, 0.15);
      border-color: var(--accent-primary);
    }

    .btn-download {
      background: linear-gradient(135deg, #2ec4b6, #1a9e92);
      border: none;
    }

    .btn-download:hover {
      background: linear-gradient(135deg, #28b0a3, #178a80);
    }

    /* ─── Modal ─── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
      padding: 24px;
    }

    .modal-overlay.open {
      opacity: 1;
      visibility: visible;
    }

    .modal-container {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      width: 100%;
      max-width: 860px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
      transform: translateY(20px) scale(0.97);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .modal-overlay.open .modal-container {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.3px;
    }

    .modal-close {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-main);
    }

    .modal-body {
      flex: 1;
      overflow: auto; /* Allow both horizontal and vertical scroll */
      background: var(--bg-secondary);
      padding: 16px;
    }

    .iframe-scaler-wrapper {
      position: relative;
      margin: 0 auto;
    }

    .iframe-scaler {
      width: 800px;
      height: 1131px; /* A4 ratio */
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
    }

    .iframe-scaler iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      border-radius: 6px;
      background: #fff;
    }

    .modal-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border-color);
      flex-shrink: 0;
    }

    .modal-download-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-primary), #6366f1);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .modal-download-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(67, 97, 238, 0.4);
    }

    .modal-download-btn .spinner {
      width: 16px;
      height: 16px;
    }

    /* ─── Modal responsive ─── */
    @media (max-width: 600px) {
      .modal-overlay {
        padding: 12px;
      }

      .modal-container {
        max-width: 100%;
        height: 90vh;
        border-radius: 12px;
      }

      .modal-header {
        padding: 12px 16px;
      }

      .modal-footer {
        padding: 12px 16px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <a href="/" class="logo">ResumeBuilder</a>
    <div class="nav-actions">
      <div class="form-group-inline">
        <label for="filename">File:</label>
        <input type="text" id="filename" placeholder="resume_name" value="john_doe_resume">
      </div>
      <button type="button" class="btn-secondary" id="load-sample">Load Sample</button>
      <button type="button" class="btn-preview" id="preview-btn">
        <span>👁 Preview</span>
      </button>
      <button type="button" class="btn-download" id="generate-btn">
        <span class="spinner"></span>
        <span class="btn-text">⬇ Download PDF</span>
      </button>
    </div>
  </nav>

  <div class="editor-container">
    <div class="editor-box">
      <div class="editor-header">
        <span class="editor-title">JSON Editor</span>
      </div>
      <textarea id="json-data" spellcheck="false" placeholder='Paste your JSON schema here...'></textarea>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="preview-modal">
    <div class="modal-container">
      <div class="modal-header">
        <span class="modal-title">Resume Preview</span>
        <button class="modal-close" id="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modal-body">
        <div class="iframe-scaler-wrapper" id="iframe-scaler-wrapper">
          <div class="iframe-scaler" id="iframe-scaler">
            <iframe id="preview-iframe" title="Resume Preview"></iframe>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="modal-download-btn" id="modal-download-btn">
          <span class="spinner"></span>
          <span class="btn-text">⬇ Download Resume</span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const jsonInput = document.getElementById('json-data');
    const filenameInput = document.getElementById('filename');
    const generateBtn = document.getElementById('generate-btn');
    const loadSampleBtn = document.getElementById('load-sample');
    const previewBtn = document.getElementById('preview-btn');
    const toast = document.getElementById('toast');

    // Modal elements
    const modal = document.getElementById('preview-modal');
    const modalCloseBtn = document.getElementById('modal-close-btn');
    const modalDownloadBtn = document.getElementById('modal-download-btn');
    const previewIframe = document.getElementById('preview-iframe');
    const iframeScaler = document.getElementById('iframe-scaler');
    const iframeScalerWrapper = document.getElementById('iframe-scaler-wrapper');
    const modalBody = document.getElementById('modal-body');

    function scalePreview() {
      // Calculate available width. If scrollbar is present, clientWidth accounts for it.
      const bodyW = modalBody.clientWidth - 32; /* minus padding */
      let scale = bodyW / 800;
      
      // Ensure it's readable on mobile by setting a minimum scale
      // This will trigger horizontal scrolling instead of microscopic text
      if (window.innerWidth <= 768) {
        scale = Math.max(scale, 0.85);
      }
      
      // Ensure it doesn't scale up too much on huge screens
      const finalScale = Math.min(scale, 1.2);

      iframeScaler.style.transform = `scale(${finalScale})`;
      iframeScalerWrapper.style.width = `${800 * finalScale}px`;
      iframeScalerWrapper.style.height = `${1131 * finalScale}px`;
    }


    const resumeData = {
      "name": "John Doe",
      "email": "johndoe100@gmail.com",
      "phone": "+91-9876543210",
      "linkedin": "https://www.linkedin.com/in/john-doe-745212278",
      "github": "https://github.com/johndoe06",
      "portfolio": "https://portfolio.com",
      "profile_summary": "AI Engineer and Full Stack Developer with 2+ years of experience delivering production ready applications. Expertise in leveraging AI and automation to improve process efficiency. Proficient in Python, Next.js, React.js, and FastAPI for building scalable data solutions.",
      "functional_areas": [
        "Machine Learning",
        "Full Stack Development",
        "AI Engineer",
        "Automation",
        "GenAI Development",
        "AI Agents"
      ],
      "technical_skills": [
        "Programming - TypeScript, Python, JavaScript, Java, C, C++",
        "Frontend Development - React.js, Next.js, Tailwind CSS, Vite, shadcn/ui, Responsive UI design",
        "Backend Development - Node.js, Express.js, Flask, REST API design, JWT Authentication",
        "AI / LLM Engineering - OpenRouter APIs, RAG, LangChain, Grounding, Scikit-learn, PyTorch",
        "Data & Storage - Supabase, MySQL, Vector Databases (Chroma)",
        "DevOps & Tools - Git, Postman, Vercel, Firebase, Puppeteer, Cheerio, N8N"
      ],
      "education": {
        "degree": "M.Tech Integrated in Software Engineering, State University",
        "duration": "08/2023 – 05/2028"
      },
      "experience": [
        {
          "company": "Nova Labs",
          "role": "Tech Lead",
          "duration": "12/2025 - Present",
          "description": "Leading development of an AI-powered platform that converts vague client design ideas into clear, designer-ready briefs."
        },
        {
          "company": "DataSphere Solutions",
          "role": "ML Intern",
          "duration": "05/2025 - 08/2025",
          "description": "Built an inventory demand prediction system using SQL Server, Flask, XGBoost, SVM, and regression models."
        },
        {
          "company": "Insight AI",
          "role": "Campus Ambassador",
          "duration": "07/2025 - 12/2025",
          "description": "Grew Insight AI's presence at State University through events, workshops, and student community initiatives."
        }
      ],
      "projects": [
        {
          "title": "Inventory Management System with QR Code Tracking",
          "duration": "12/2024 – 01/2025",
          "points": [
            "Built a SaaS platform using React (Vite.js) with ShadCN UI and Tailwind CSS for a responsive and modern interface.",
            "Integrated 70+ APIs to enable QR-based stock tracking, POS operations, and real-time low-stock alerts.",
            "Designed an employee scheduling system with a Google Calendar-style UI for managing availability and shifts.",
            "Implemented secure authentication using Firebase and JWT for role-based access control.",
            "Integrated Gemini Flash 2.0 API for a context-aware AI assistant and applied SARIMAX in Django for intelligent sales and order forecasting."
          ]
        },
        {
          "title": "AI-Powered Marketplace for Designers and Founders",
          "duration": "06/2024 – 12/2024",
          "points": [
            "Developed an AI-powered conversational assistant to automate merchandise brief creation through intelligent founder interviews.",
            "Integrated LLMs (GPT-4o-mini via OpenRouter API) for context-aware interactions and structured output generation.",
            "Built a responsive web application using Next.js, React, and Tailwind CSS with modern UI components and animations.",
            "Implemented backend services using Firebase and Cloudinary for data management and file handling."
          ]
        },
        {
          "title": "Personalised Campus LLM",
          "duration": "12/2025 - Present",
          "points": [
            "Developed a full-stack RAG (Retrieval Augmented Generation) system using Next.js (frontend) and FastAPI (backend) with a modular architecture.",
            "Implemented secure authentication and role-based access control (Admin/Student) using JWT and SQLite for user management.",
            "Designed a context-aware AI chat system integrating OpenRouter LLM to answer queries based on uploaded knowledge.",
            "Developed a responsive, dark-themed chat UI with seamless interaction between frontend and backend services.",
            "Ensured persistent storage and efficient retrieval using ChromaDB, maintaining knowledge across server restarts."
          ]
        },
        {
          "title": "Ai Deepfake Detection",
          "duration": "",
          "points": [
            "Designed and developed a multi-layer forensic image analysis system to detect deepfakes images.",
            "Combined AI-based detection with traditional forensic techniques, including Frequency Domain Analysis (FFT), Error Level Analysis (ELA), and EXIF metadata inspection.",
            "Built a decision pipeline leveraging an open-source Hugging Face model and an OpenRouter VLM to classify images as AI-generated, edited, or authentic.",
            "Developed a full-stack solution using Next.js (frontend) and FastAPI (backend) with SQLite DB."
          ]
        }
      ],
      "achievements": [
        "Winner, TechSprint 26 Hackathon (National Level) – ₹10,000 prize, Top 1 among 250+ teams",
        "Winner, InnovateX at Sunrise Engineering College (National Level) – ₹10,000 prize, out of 100+ teams",
        "Winner, CodeQuest 2.0 – ₹10,000 prize, ranked 1st among 50+ colleges",
        "Winner, Vertex College Codeathon – ₹1,500 prize, from 600+ participants"
      ],
      "volunteer_experience": [
        "Senior core member at THE AI/ML CLUB STATE UNIVERSITY"
      ]
    };


    function showToast(message, isSuccess = false) {
      toast.textContent = message;
      toast.className = isSuccess ? 'success show' : 'show';
      setTimeout(() => { toast.classList.remove('show'); }, 4000);
    }

    // ─── Activate Preview button when valid JSON is present ───
    function checkJsonValid() {
      const raw = jsonInput.value.trim();
      if (!raw) { previewBtn.classList.remove('active'); return; }
      try {
        JSON.parse(raw);
        previewBtn.classList.add('active');
      } catch {
        previewBtn.classList.remove('active');
      }
    }

    jsonInput.addEventListener('input', checkJsonValid);

    loadSampleBtn.addEventListener('click', () => {
      jsonInput.value = JSON.stringify(resumeData, null, 2);
      showToast('Sample loaded successfully!', true);
      checkJsonValid();
    });

    // ─── Preview Modal ───
    function openModal() { modal.classList.add('open'); document.body.style.overflow = 'hidden'; }
    function closeModal() { modal.classList.remove('open'); document.body.style.overflow = ''; }

    modalCloseBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    window.addEventListener('resize', () => { if (modal.classList.contains('open')) scalePreview(); });

    previewBtn.addEventListener('click', async () => {
      const rawJson = jsonInput.value.trim();
      let parsedData;
      try { parsedData = JSON.parse(rawJson); } catch { showToast('Invalid JSON.'); return; }

      openModal();

      try {
        const res = await fetch('/preview', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: parsedData })
        });
        if (!res.ok) throw new Error('Preview failed');
        const html = await res.text();
        const doc = previewIframe.contentDocument || previewIframe.contentWindow.document;
        doc.open();
        doc.write(html);
        doc.close();
        // Wait a frame for layout then scale
        requestAnimationFrame(() => { requestAnimationFrame(scalePreview); });
      } catch (err) {
        showToast('Failed to load preview.');
        closeModal();
      }
    });

    // ─── Download helper (shared by both buttons) ───
    async function downloadResume(btn) {
      const rawJson = jsonInput.value.trim();
      let filename = filenameInput.value.trim() || 'resume';
      if (!filename.endsWith('.pdf')) filename += '.pdf';

      if (!rawJson) { showToast('JSON payload cannot be empty.'); return; }
      let parsedData;
      try { parsedData = JSON.parse(rawJson); } catch { showToast('Invalid JSON structure.'); return; }

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const response = await fetch('/pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data: parsedData, filename: filename })
        });

        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || `Server returned ${response.status}`);
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.style.display = 'none';
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);

        showToast('Resume generated and downloading!', true);
      } catch (error) {
        console.error(error);
        showToast(`Failed: ${error.message}`);
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    generateBtn.addEventListener('click', () => downloadResume(generateBtn));
    modalDownloadBtn.addEventListener('click', () => downloadResume(modalDownloadBtn));

    // Initial load
    jsonInput.value = JSON.stringify(resumeData, null, 2);
    checkJsonValid();

  </script>
</body>
</html>
